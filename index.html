<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta
    name="viewport"
    content="width=1080, height=1920, initial-scale=1"
  >
  <title>Home</title>

  <div id="screenSize">
    <div
      id="headerItem"
      class="row"
      style="top:80px; height:300px;"
    >
      <div
        id="row-1-element-1"
        class="element"
        style="left:0px; top:0px; width:1080px; height:300px; z-index:1;"
      ></div>
    </div>

    <div
      id="row-2"
      class="row"
      style="
        top:460px;
        height:600px;
        background-image:url('assets/Main Menu Starting Point.png');
        background-repeat:no-repeat;
        background-size:cover;
        background-position:center;
      "
    >
      <div
        id="Title_Card"
        class="element"
        style="left:0px; top:47px; width:1080px; height:607px; z-index:1;"
      >
        <button
          id="productsMainMenuHotspot"
          class="main-menu-hotspot"
          type="button"
          aria-label="Open Products landing page"
          data-content-page="content/products/index.html"
          style="left:32px; top:180px; width:239px; height:180px;"
        ></button>

        <button
          id="globalVisionMainMenuHotspot"
          class="main-menu-hotspot"
          type="button"
          aria-label="Open Global Vision landing page"
          data-content-page="content/global-vision/index.html"
          style="left:284px; top:180px; width:239px; height:180px;"
        ></button>

        <button
          id="digitalSolutionsMainMenuHotspot"
          class="main-menu-hotspot"
          type="button"
          aria-label="Open Digital Solutions landing page"
          data-content-page="content/digital-solutions/index.html"
          style="left:537px; top:180px; width:239px; height:180px;"
        ></button>

        <button
          id="digitalPlatformMainMenuHotspot"
          class="main-menu-hotspot"
          type="button"
          aria-label="Open Digital Platform landing page"
          data-content-page="content/digital-platform/index.html"
          style="left:793px; top:180px; width:239px; height:180px;"
        ></button>
      </div>
    </div>

    <div
      id="footer"
      class="row"
      style="top:1240px; height:600px;"
    >
      <div
        id="footer-element-1"
        class="element"
        style="left:0px; top:0px; width:1080px; height:600px; z-index:1;"
      ></div>
    </div>
  </div>

    role="dialog"
    aria-modal="true"
    aria-label="Kiosk content"

      id="content"
      name="content"
      class="modal-content-frame"
      title="Kiosk content page"
      src="about:blank"
      scrolling="no"
    ></iframe>

      id="backButtonTip"
      class="kiosk-tip back-button-tip"
      aria-live="polite"
    >
      Tap to return to the previous page
    </div>

      aria-live="polite"
