<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta
    name="viewport"
    content="width=1920, height=1080, initial-scale=1"
  >
  <title>Spindle Length Models 65 and 80 Plus</title>

  <style>
    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #111111;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /*
      The selected PNG fills the iframe as completely as possible without
      cropping or distorting the artwork.
    */
    .full-frame-image {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: contain;
      background: #111111;
    }
  </style>
</head>

<body>
  <img
    class="full-frame-image"
    src="SpindleLengthPage1 _ 65&amp;80+.png"
    alt="Spindle length models 65 and 80 plus"
  >
</body>
